<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        header p {
            color: #888;
        }
        
        .proxy-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #0f0f1a;
            color: #fff;
            font-size: 1rem;
        }
        
        input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .status.hidden {
            display: none;
        }
        
        .status.error {
            border: 1px solid #ff4444;
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #proxy-frame {
            width: 100%;
            height: 80vh;
            border: none;
            border-radius: 10px;
            background: #fff;
        }
        
        #proxy-frame.hidden {
            display: none;
        }
        
        .info {
            background: #0f0f1a;
            padding: 20px;
            border-radius: 10px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            color: #00d4ff;
        }
        
        .info ol {
            margin-left: 20px;
            line-height: 1.8;
        }
        
        .note {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Scramjet Proxy</h1>
            <p>Powered by Mercury Workshop</p>
        </header>

        <main>
            <div class="proxy-box" style="margin-bottom: 10px;">
                <input 
                    type="text"
                    id="backend-url"
                    placeholder="Proxy backend (e.g., http://129.146.87.206:8080)"
                    autocomplete="off"
                    value="http://129.146.87.206:8080"
                    style="font-size: 0.85rem;"
                >
            </div>
            <div class="proxy-box">
                <input 
                    type="text"
                    id="url-input"
                    placeholder="Enter URL to browse (e.g., https://example.com)"
                    autocomplete="off"
                >
                <button id="go-btn">Go</button>
            </div>

            <div id="status" class="status hidden">
                <span class="spinner"></span>
                <span id="status-text">Initializing...</span>
            </div>

            <iframe id="proxy-frame" class="hidden" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-downloads"></iframe>

            <div class="info" id="info-box">
                <h3>How to use:</h3>
                <ol>
                    <li>Enter any URL in the box above</li>
                    <li>Click "Go" or press Enter</li>
                    <li>Browse freely through the proxy</li>
                </ol>
                <p class="note">
                    <strong>Note:</strong> This proxy uses Scramjet to bypass internet censorship.
                </p>
            </div>
        </main>
    </div>

    <script>
        // Service Worker code as a string
        const swCode = `
            // Install and activate immediately
            self.addEventListener('install', (event) => {
                console.log('SW: Installing...');
                self.skipWaiting();
            });

            self.addEventListener('activate', (event) => {
                console.log('SW: Activating...');
                event.waitUntil(self.clients.claim());
            });

            // Fetch handler - let /~/ URLs pass through to server
            self.addEventListener('fetch', (event) => {
                const url = new URL(event.request.url);
                console.log('SW: Fetch', url.pathname);
                
                // Let /~/ URLs pass through to server
                if (url.pathname.startsWith('/~/')) {
                    console.log('SW: Passing /~/ URL to server');
                    return;
                }
                
                // Normal fetch for everything else
                event.respondWith(fetch(event.request));
            });
        `;

        // Main application code
        (function() {
            'use strict';

            // DOM Elements
            const urlInput = document.getElementById('url-input');
            const backendUrlInput = document.getElementById('backend-url');
            const goBtn = document.getElementById('go-btn');
            const statusDiv = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            const proxyFrame = document.getElementById('proxy-frame');
            const infoBox = document.getElementById('info-box');

            let isInitialized = false;

            function showStatus(text, isError = false) {
                statusDiv.classList.remove('hidden');
                statusText.textContent = text;
                if (isError) {
                    statusDiv.classList.add('error');
                } else {
                    statusDiv.classList.remove('error');
                }
            }

            function hideStatus() {
                statusDiv.classList.add('hidden');
            }

            // Create and register Service Worker from blob
            async function registerServiceWorker() {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                
                if ('serviceWorker' in navigator) {
                    try {
                        // Unregister any existing SWs
                        const registrations = await navigator.serviceWorker.getRegistrations();
                        for (const reg of registrations) {
                            await reg.unregister();
                        }
                        
                        // Clear caches
                        if ('caches' in window) {
                            const cacheNames = await caches.keys();
                            for (const name of cacheNames) {
                                await caches.delete(name);
                            }
                        }
                        
                        // Register new SW
                        const registration = await navigator.serviceWorker.register(swUrl);
                        console.log('SW registered:', registration.scope);
                        return true;
                    } catch (err) {
                        console.error('SW registration failed:', err);
                        return false;
                    }
                }
                return false;
            }

            // Initialize the proxy
            async function init() {
                showStatus('Initializing proxy...');

                try {
                    const swRegistered = await registerServiceWorker();
                    if (!swRegistered) {
                        console.warn('Service Worker not available, continuing without it');
                    }
                    
                    isInitialized = true;
                    hideStatus();
                } catch (error) {
                    console.error('Initialization error:', error);
                    showStatus(`Error: ${error.message}`, true);
                }
            }

            // Navigate to a URL through the proxy
            async function navigate(url) {
                if (!isInitialized) {
                    showStatus('Please wait, still initializing...', true);
                    return;
                }

                if (!url) {
                    showStatus('Please enter a URL', true);
                    return;
                }

                // Add protocol if missing
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }

                showStatus(`Loading ${url}...`);

                try {
                    // Get backend URL (default to current origin if not set)
                    let backendUrl = backendUrlInput.value.trim();
                    if (!backendUrl) {
                        backendUrl = window.location.origin;
                    }
                    // Remove trailing slash
                    backendUrl = backendUrl.replace(/\/$/, '');
                    
                    // Manual base64 encoding
                    const base64 = btoa(url);
                    const encoded = `${backendUrl}/~/${base64}`;
                    
                    console.log('Encoded URL:', encoded);
                    
                    // Hide info box, show iframe
                    infoBox.style.display = 'none';
                    proxyFrame.src = encoded;
                    proxyFrame.classList.remove('hidden');
                    hideStatus();
                } catch (error) {
                    console.error('Navigation error:', error);
                    showStatus(`Error: ${error.message}`, true);
                }
            }

            // Event listeners
            goBtn.addEventListener('click', () => {
                navigate(urlInput.value.trim());
            });

            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    navigate(urlInput.value.trim());
                }
            });

            // Initialize on load
            init();
        })();
    </script>
</body>
</html>

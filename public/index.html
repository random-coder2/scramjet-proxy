<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet Proxy</title>
    <link rel="stylesheet" href="style.css">
    <!-- Load BareMux -->
    <script src="https://unpkg.com/@mercuryworkshop/bare-mux@2.1.5/dist/index.js"></script>
    <!-- Load Scramjet -->
    <script src="scramjet.bundle.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Scramjet Proxy</h1>
            <p>Powered by Mercury Workshop</p>
        </header>

        <main>
            <div class="proxy-box">
                <input 
                    type="text"
                    id="url-input"
                    placeholder="Enter URL (e.g., https://example.com)"
                    autocomplete="off"
                >
                <button id="go-btn">Go</button>
            </div>

            <div id="status" class="status hidden">
                <span class="spinner"></span>
                <span id="status-text">Initializing...</span>
            </div>

            <iframe id="proxy-frame" class="hidden" style="width: 100%; height: 80vh; border: none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation allow-downloads"></iframe>

            <div class="info">
                <h3>How to use:</h3>
                <ol>
                    <li>Enter any URL in the box above</li>
                    <li>Click "Go" or press Enter</li>
                    <li>Browse freely through the proxy</li>
                </ol>
                <p class="note">
                    <strong>Note:</strong> This proxy uses Scramjet to bypass internet censorship.
                </p>
            </div>
        </main>
    </div>

    <!-- Main app -->
    <script src="app.js"></script>
</body>
</html>
